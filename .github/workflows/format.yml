name: Format
on:
  push:
    branches: [main]
  pull_request:
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/julia-format@v4
        with:
          version: '1'   # JuliaFormatter v1
          mode: check     # fails if files are not formatted
